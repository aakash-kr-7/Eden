name: eden
description: A relationship that remembers.
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^13.2.0
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  dio: ^5.4.0
  firebase_core: ^2.24.0
  firebase_auth: ^4.15.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  path_provider: ^2.1.2
  flutter_keyboard_visibility: ^6.0.0
  share_plus: ^7.2.1
  
  # Core dependencies needed by the existing codebase:
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  http: ^1.2.0
  local_auth: ^2.1.8
  uuid: ^4.3.3
  video_player: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  isar_generator: ^3.1.0+1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/eden_logo.png
    - assets/images/google_logo.png
    - assets/icon/app_icon.png
    - assets/bootup_animation.mp4
    - assets/images/black_square.png
  fonts:
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Light.ttf
          weight: 300
        - asset: assets/fonts/CormorantGaramond-Regular.ttf
          weight: 400
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Bold.ttf
          weight: 700

flutter_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
